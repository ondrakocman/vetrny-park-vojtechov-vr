<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Větrný Park Vojtěchov – VR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',system-ui,sans-serif;background:#efeae2;color:#222}
    #landing{position:fixed;inset:0;z-index:9999;background:#efeae2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transition:opacity .4s}
    #landing.hidden{opacity:0;pointer-events:none}
    .logos{display:flex;align-items:center;justify-content:center;gap:48px;margin-bottom:36px;flex-wrap:wrap}
    .logos img{height:96px;width:auto;object-fit:contain}
    .logos .noho{height:64px}
    h1{font-size:clamp(2.2rem,4.6vw,3.6rem);font-weight:800;letter-spacing:.01em;margin-bottom:10px;text-align:center;color:#0a2540}
    .subtitle{color:#777;font-size:1rem;margin-bottom:48px;text-align:center;font-weight:400}
    .buttons{display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center}
    .view-btn{padding:22px 56px;font-size:1.25rem;border:none;border-radius:60px;cursor:pointer;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:transform .15s,box-shadow .15s;font-family:inherit;background:linear-gradient(135deg,#249e6b,#cedc00);box-shadow:0 6px 24px rgba(36,158,107,.35)}
    .view-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(36,158,107,.45)}
    .hint{margin-top:32px;color:#888;font-size:.85rem;text-align:center;max-width:480px;line-height:1.5}
    #loading-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
    #loading-overlay.visible{display:flex}
    .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#cedc00;border-radius:50%;animation:spin .7s linear infinite;margin-right:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .a-enter-vr{display:none!important}
  </style>
</head>
<body>

<div id="landing">
  <div class="logos">
    <img class="noho" src="assets/noho-logo.svg" alt="NOHO" onerror="this.style.display='none'">
    <img src="assets/vojtechov-logo.png" alt="Vojtěchov" onerror="this.style.display='none'">
  </div>
  <h1>Větrný Park Vojtěchov – VR</h1>
  <p class="subtitle">Vizualizace větrného parku – dva pohledy</p>
  <div class="buttons">
    <button class="view-btn" data-vid="vid-parku">U Parku</button>
    <button class="view-btn" data-vid="vid-prejezdu">U Přejezdu</button>
  </div>
  <p class="hint">Nasaďte Meta Quest a vyberte pohled.</p>
</div>

<div id="loading-overlay"><div class="spinner"></div><span>Načítání…</span></div>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<a-scene vr-mode-ui="enabled:false" renderer="colorManagement:true;sortObjects:true;antialias:true" loading-screen="enabled:false" webxr="requiredFeatures:local-floor">
  <a-assets timeout="120000">
    <video id="vid-parku" src="assets/u-parku.mp4" crossorigin="anonymous" playsinline loop muted preload="auto"></video>
    <video id="vid-prejezdu" src="assets/u-prejezdu.mp4" crossorigin="anonymous" playsinline loop muted preload="auto"></video>
  </a-assets>
  <a-sky id="sky-parku"    visible="false" material="shader:flat;src:#vid-parku;side:back"></a-sky>
  <a-sky id="sky-prejezdu" visible="false" material="shader:flat;src:#vid-prejezdu;side:back"></a-sky>
  <a-entity id="rig" position="0 1.6 0">
    <a-camera look-controls="pointerLockEnabled:false" wasd-controls="enabled:true;acceleration:20"></a-camera>
  </a-entity>
</a-scene>

<script>
(function(){
  'use strict';
  var landing = document.getElementById('landing');
  var loading = document.getElementById('loading-overlay');
  var scene   = document.querySelector('a-scene');
  var SKY = { 'vid-parku': document.getElementById('sky-parku'), 'vid-prejezdu': document.getElementById('sky-prejezdu') };
  var activeVid = null;

  function wait(ms){ return new Promise(function(r){ setTimeout(r, ms) }) }

  document.querySelectorAll('.view-btn').forEach(function(btn){
    btn.addEventListener('click', async function(){
      var vidId = btn.dataset.vid;
      var video = document.getElementById(vidId);
      var sky   = SKY[vidId];
      activeVid = video;
      loading.classList.add('visible');
      if(!scene.hasLoaded) await new Promise(function(r){ scene.addEventListener('loaded', r, { once:true }) });
      try{ await scene.enterVR() }catch(e){ console.warn('VR fallback:', e) }
      await wait(300);
      try{ await video.play() }catch(e){ console.warn('Video:', e) }
      await wait(150);
      sky.object3D.visible = true;
      landing.classList.add('hidden');
      loading.classList.remove('visible');
    });
  });

  scene.addEventListener('exit-vr', function(){
    Object.values(SKY).forEach(function(s){ s.object3D.visible = false });
    if(activeVid){ try{ activeVid.pause(); activeVid.currentTime = 0 }catch(e){} activeVid = null; }
    landing.classList.remove('hidden');
  });
})();
</script>
</body>
</html>
