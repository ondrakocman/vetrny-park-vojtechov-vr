<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Větrný Park Vojtěchov – VR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',system-ui,sans-serif;background:#efeae2;color:#222}
    #landing{position:fixed;inset:0;z-index:9999;background:#efeae2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transition:opacity .4s}
    #landing.hidden{opacity:0;pointer-events:none}
    .logos{display:flex;align-items:center;justify-content:center;gap:48px;margin-bottom:36px;flex-wrap:wrap}
    .logos img{height:96px;width:auto;object-fit:contain}
    .logos .noho{height:64px}
    h1{font-size:clamp(2.2rem,4.6vw,3.6rem);font-weight:800;letter-spacing:.01em;margin-bottom:10px;text-align:center;color:#0a2540}
    .subtitle{color:#777;font-size:1rem;margin-bottom:48px;text-align:center;font-weight:400}
    .buttons{display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center}
    .view-btn{padding:22px 56px;font-size:1.25rem;border:none;border-radius:60px;cursor:pointer;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:transform .15s,box-shadow .15s;font-family:inherit;background:linear-gradient(135deg,#249e6b,#cedc00);box-shadow:0 6px 24px rgba(36,158,107,.35)}
    .view-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(36,158,107,.45)}
    .hint{margin-top:32px;color:#888;font-size:.85rem;text-align:center;max-width:480px;line-height:1.5}
    #loading-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
    #loading-overlay.visible{display:flex}
    .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#cedc00;border-radius:50%;animation:spin .7s linear infinite;margin-right:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #view-label{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(0,0,0,.55);color:#fff;padding:8px 20px;border-radius:40px;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(6px);opacity:0;transition:opacity .3s;pointer-events:none}
    #view-label.visible{opacity:1}
    #exit-btn{position:fixed;top:16px;right:16px;z-index:50;background:rgba(0,0,0,.55);color:#fff;border:none;padding:8px 16px;border-radius:40px;cursor:pointer;font-family:inherit;font-size:.85rem;display:none;backdrop-filter:blur(6px)}
    #exit-btn.visible{display:block}
    .a-enter-vr{display:none!important}
  </style>
</head>
<body>

<div id="landing">
  <div class="logos">
    <img class="noho" src="assets/noho-logo.svg" alt="NOHO" onerror="this.style.display='none'">
    <img src="assets/vojtechov-logo.png" alt="Vojtěchov" onerror="this.style.display='none'">
  </div>
  <h1>Větrný Park Vojtěchov – VR</h1>
  <p class="subtitle">Vizualizace větrného parku – dva pohledy</p>
  <div class="buttons">
    <button class="view-btn" data-view="parku">U Parku</button>
    <button class="view-btn" data-view="prejezdu">U Přejezdu</button>
  </div>
  <p class="hint">Nasaďte Meta Quest a vyberte pohled. Pohledy přepnete posunutím pravého ovladače doprava.</p>
</div>

<div id="loading-overlay"><div class="spinner"></div><span>Načítání…</span></div>

<div id="view-label"></div>
<button id="exit-btn">Zpět na výběr</button>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<a-scene vr-mode-ui="enabled:false" renderer="colorManagement:true;sortObjects:true;antialias:true" loading-screen="enabled:false" webxr="requiredFeatures:local-floor">
  <a-assets timeout="120000">
    <video id="vid-parku" src="assets/u-parku.mp4" crossorigin="anonymous" playsinline loop muted preload="auto"></video>
    <video id="vid-prejezdu" src="assets/u-prejezdu.mp4" crossorigin="anonymous" playsinline loop muted preload="auto"></video>
  </a-assets>

  <a-sky id="sky" visible="false" material="shader:flat;side:back"></a-sky>

  <a-entity id="rig" position="0 1.6 0">
    <a-camera look-controls="pointerLockEnabled:false" wasd-controls="enabled:true;acceleration:20"></a-camera>
    <a-entity id="left-hand" oculus-touch-controls="hand: left"></a-entity>
    <a-entity id="right-hand" oculus-touch-controls="hand: right"></a-entity>
  </a-entity>
</a-scene>

<script>
(function(){
  'use strict';

  var VIEWS = {
    parku:    { videoId: 'vid-parku',    label: 'U Parku' },
    prejezdu: { videoId: 'vid-prejezdu', label: 'U Přejezdu' }
  };
  var ORDER = ['parku', 'prejezdu'];

  var landing  = document.getElementById('landing');
  var loading  = document.getElementById('loading-overlay');
  var scene    = document.querySelector('a-scene');
  var sky      = document.getElementById('sky');
  var label    = document.getElementById('view-label');
  var exitBtn  = document.getElementById('exit-btn');
  var rightHand = document.getElementById('right-hand');
  var leftHand  = document.getElementById('left-hand');

  var currentView = null;
  var sessionActive = false;

  function wait(ms){ return new Promise(function(r){ setTimeout(r, ms) }) }

  function getVideo(view){ return document.getElementById(VIEWS[view].videoId) }

  function showLabel(text){
    label.textContent = text;
    label.classList.add('visible');
    clearTimeout(showLabel._t);
    showLabel._t = setTimeout(function(){ label.classList.remove('visible') }, 1800);
  }

  async function setView(view){
    if(!VIEWS[view] || view === currentView) return;
    var nextVideo = getVideo(view);

    // Pause and reset all other videos so only one decodes at a time
    ORDER.forEach(function(k){
      if(k !== view){
        var v = getVideo(k);
        try{ v.pause(); v.currentTime = 0 }catch(e){}
      }
    });

    sky.setAttribute('material', 'shader:flat;src:#' + VIEWS[view].videoId + ';side:back');
    try{ await nextVideo.play() }catch(e){ console.warn('Video play:', e) }
    sky.object3D.visible = true;
    currentView = view;
    showLabel(VIEWS[view].label);
  }

  function nextView(){
    var i = ORDER.indexOf(currentView);
    var n = ORDER[(i + 1) % ORDER.length];
    setView(n);
  }

  async function startSession(view){
    loading.classList.add('visible');
    if(!scene.hasLoaded){
      await new Promise(function(r){ scene.addEventListener('loaded', r, { once:true }) });
    }
    try{ await scene.enterVR() }catch(e){ console.warn('VR fallback:', e) }
    await wait(250);
    await setView(view);
    landing.classList.add('hidden');
    exitBtn.classList.add('visible');
    loading.classList.remove('visible');
    sessionActive = true;
  }

  function endSession(){
    sessionActive = false;
    sky.object3D.visible = false;
    ORDER.forEach(function(k){
      var v = getVideo(k);
      try{ v.pause(); v.currentTime = 0 }catch(e){}
    });
    currentView = null;
    landing.classList.remove('hidden');
    exitBtn.classList.remove('visible');
    label.classList.remove('visible');
  }

  // Landing buttons
  document.querySelectorAll('.view-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ startSession(btn.dataset.view) });
  });

  exitBtn.addEventListener('click', function(){
    if(scene.is('vr-mode')){
      try{ scene.exitVR() }catch(e){}
    }
    endSession();
  });

  scene.addEventListener('exit-vr', endSession);

  // ---- Right thumbstick → toggle view ----
  // Debounced edge trigger: fires once when stick crosses +X threshold,
  // re-arms only after returning near center.
  var THRESH = 0.6, RELEASE = 0.25;
  var armed = { right: true, left: true };

  function thumbstickHandler(side){
    return function(evt){
      if(!sessionActive) return;
      var x = (evt.detail && typeof evt.detail.x === 'number') ? evt.detail.x : 0;
      if(armed[side] && x > THRESH){
        armed[side] = false;
        nextView();
      } else if(!armed[side] && Math.abs(x) < RELEASE){
        armed[side] = true;
      }
    };
  }

  rightHand.addEventListener('thumbstickmoved', thumbstickHandler('right'));
  // Mirror on left controller too — pushing either stick right toggles
  leftHand.addEventListener('thumbstickmoved', thumbstickHandler('left'));

  // Keyboard fallback for desktop testing: ArrowRight toggles
  window.addEventListener('keydown', function(e){
    if(!sessionActive) return;
    if(e.key === 'ArrowRight' || e.key === ' '){ nextView() }
    if(e.key === 'Escape'){ exitBtn.click() }
  });
})();
</script>
</body>
</html>
